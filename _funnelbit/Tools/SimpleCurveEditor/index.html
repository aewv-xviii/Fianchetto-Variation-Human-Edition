<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RimWorld SimpleCurve Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>SimpleCurve Editor</h1>
            <div class="header-controls">
                <button id="helpBtn" class="icon-btn" title="Help">?</button>
            </div>
        </header>

        <main class="editor-workspace">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="curveCanvas"></canvas>
                <div class="canvas-overlay">
                    <div class="coords-display" id="coordsDisplay">X: 0.00, Y: 0.00</div>
                </div>
            </div>

            <aside class="sidebar">
                <div class="panel-section">
                    <h2>Mode</h2>
                    <div class="radio-group">
                        <label class="radio-btn">
                            <input type="radio" name="editMode" value="manual" checked>
                            <span>Manual</span>
                        </label>
                        <label class="radio-btn">
                            <input type="radio" name="editMode" value="bezier">
                            <span>Bezier</span>
                        </label>
                    </div>
                </div>

                <div class="panel-section" id="bezierControls" style="display: none;">
                    <h2>Bezier Settings</h2>
                    <div class="control-group">
                        <label>Sampling Mode</label>
                        <div class="radio-group" style="margin-bottom: 8px;">
                            <label class="radio-btn">
                                <input type="radio" name="samplingMode" value="uniform" checked>
                                <span>Uniform</span>
                            </label>
                            <label class="radio-btn">
                                <input type="radio" name="samplingMode" value="curvature">
                                <span>Curvature</span>
                            </label>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="bezierSamples">Samples</label>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input type="range" id="bezierSamplesSlider" min="2" max="50" value="10">
                            <input type="number" id="bezierSamples" value="10" min="2" max="100" style="width: 50px;">
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h2>Actions</h2>
                    <button id="clearBtn" class="btn btn-danger">Clear All</button>
                    <button id="fitBtn" class="btn">Fit View</button>
                </div>

                <div class="panel-section flex-grow">
                    <h2>XML Output</h2>
                    <textarea id="xmlOutput" readonly class="code-editor"></textarea>
                    <button id="copyBtn" class="btn btn-primary">Copy XML</button>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
